name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – TEST
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      NODE_ENV: ${{ vars.NODE_ENV }}
      SITE_TITLE: ${{ vars.SITE_TITLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --include=dev
        env:
          NODE_ENV: development

      - name: Run linters
        run: npm run lint:all

      - name: Run URL checker
        env:
          URL_CHECKER_TIMEOUT: ${{ vars.URL_CHECKER_TIMEOUT || '30' }}
        run: node script/url-checker.js -t $URL_CHECKER_TIMEOUT -d src/

  # ─────────────────────────────────────────────
  # JOB 2 – BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --include=dev
        env:
          NODE_ENV: development

      - name: Build 11ty site
        env:
          PATH_PREFIX: /${{ github.event.repository.name }}/
          NODE_ENV: production
        run: npm run prod

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  # ─────────────────────────────────────────────
  # JOB 3 – DEPLOY
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    # Only deploy on pushes to main, not on pull requests
    if: github.event_name != 'pull_request'

    permissions:
      pages: write
      id-token: write
      issues: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create deployment summary issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY_DATE=$(date -u +"%Y-%m-%d")
          PAGE_URL="${{ steps.deployment.outputs.page_url }}"

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$DEPLOY_DATE - Deployment: succeeded" \
            --body "URL: $PAGE_URL"
