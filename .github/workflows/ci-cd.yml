name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "package*.json"
      - ".eleventy.js"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "package*.json"
      - ".eleventy.js"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – TEST
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      NODE_ENV: ${{ vars.NODE_ENV }}
      SITE_TITLE: ${{ vars.SITE_TITLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --include=dev

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 2 – BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --include=dev

      - name: Build 11ty site
        env:
          PATH_PREFIX: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  # ─────────────────────────────────────────────
  # JOB 3 – DEPLOY
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    # Only deploy on pushes to main (not on pull_request events)
    if: github.event_name != 'pull_request'

    permissions:
      pages: write
      id-token: write
      issues: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create deployment summary issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAGE_URL="${{ steps.deployment.outputs.page_url }}"

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Deployment Summary: ${{ github.ref_name }} @ $(echo '${{ github.sha }}' | cut -c1-7)" \
            --body "## Deployment Summary

          A new version of the knowledge base has been successfully deployed to GitHub Pages.

          | Field | Value |
          |---|---|
          | **Repository** | \`${{ github.repository }}\` |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | [${{ github.sha }}]($COMMIT_URL) |
          | **Triggered by** | \`${{ github.actor }}\` |
          | **Event** | \`${{ github.event_name }}\` |
          | **Deployed at** | $DEPLOY_DATE |
          | **Live URL** | $PAGE_URL |
          | **Workflow run** | [View run]($RUN_URL) |

          ### Changes in this deployment
          \`\`\`
          ${{ github.event.head_commit.message }}
          \`\`\`
          "
